services:
  client:
    build:
      context: ./
      dockerfile: Dockerfile.client
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - backend

  api:
    build:
      # Context is the Projects/ parent so Docker can access both
      # ArbiScannerAdminPannel/ and the referenced ArbiScannerWebApp/ sibling
      context: ../
      dockerfile: ArbiScannerAdminPannel/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=ArbiScannerBot;Username=postgres;Password=REDACTED"
      ConnectionStrings__AdminConnection: "Host=postgres;Port=5432;Database=ArbiScannerAdminPanelDb;Username=postgres;Password=REDACTED"
      Redis__Endpoint: "redis:6379"
      Cors__AllowedOrigins: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: REDACTED
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
