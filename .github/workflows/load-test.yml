name: Load Test

on:
  workflow_dispatch:
    inputs:
      queries_per_minute:
        description: "Target queries per minute per endpoint"
        required: false
        default: "60"
      duration_seconds:
        description: "Duration of sustained load, in seconds"
        required: false
        default: "60"
  schedule:
    # Nightly smoke run against the configured environment, at low default load.
    - cron: "0 3 * * *"

jobs:
  load-test:
    runs-on: ubuntu-latest
    environment: load-test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ArbiScannerAdminPanel.LoadTests/ArbiScannerAdminPanel.LoadTests.csproj

      - name: Run load tests
        env:
          ADMINPANEL_LOADTEST_BASE_URL: ${{ secrets.ADMINPANEL_LOADTEST_BASE_URL }}
          ADMINPANEL_LOADTEST_USERNAME: ${{ secrets.ADMINPANEL_LOADTEST_USERNAME }}
          ADMINPANEL_LOADTEST_PASSWORD: ${{ secrets.ADMINPANEL_LOADTEST_PASSWORD }}
          ADMINPANEL_LOADTEST_QUERIES_PER_MINUTE: ${{ inputs.queries_per_minute || '60' }}
          ADMINPANEL_LOADTEST_DURATION_SECONDS: ${{ inputs.duration_seconds || '60' }}
        run: >
          dotnet test ArbiScannerAdminPanel.LoadTests/ArbiScannerAdminPanel.LoadTests.csproj
          --configuration Release
          --logger "trx;LogFileName=load-tests.trx"
          --results-directory ./TestResults

      - name: Publish load test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Load Test Results
          path: "TestResults/*.trx"
          reporter: dotnet-trx
