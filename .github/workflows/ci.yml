name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          path: ArbiScannerAdminPannel
          fetch-depth: 0

      - name: Checkout sibling ArbiScannerWebApp (cross-submodule project reference)
        uses: actions/checkout@v7
        with:
          repository: dimasdom/ArbiSpreadScanner.WebApp
          path: ArbiScannerWebApp

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      # SonarCloud is free for public repos (no paid license needed); requires a SONAR_TOKEN
      # secret from the project's SonarCloud org, and /k /o below to match the imported project.
      - name: Set up JDK for SonarCloud
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Cache SonarCloud packages
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install SonarCloud scanner
        working-directory: ArbiScannerAdminPannel
        run: |
          dotnet tool install --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Begin SonarCloud analysis
        working-directory: ArbiScannerAdminPannel
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet-sonarscanner begin
          /k:"dimasdom_ArbiSpreadScanner.AdminPannel"
          /o:"dimasdom"
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.vstest.reportsPaths="TestResults/*.trx"

      # CodeQL is free for public GitHub repos, no external account/secrets needed.
      # JS/TS only supports build-mode "none" (it's not compiled), while C# needs "manual"
      # since it's built explicitly below - so each language gets its own init call.
      - name: Initialize CodeQL (C#)
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual
          source-root: ArbiScannerAdminPannel

      - name: Initialize CodeQL (JavaScript/TypeScript)
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none
          source-root: ArbiScannerAdminPannel

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: ArbiScannerAdminPannel/ArbiScannerAdminPanel.Client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: ArbiScannerAdminPannel/ArbiScannerAdminPanel.Client

      - name: Client tests
        run: npm test -- --reporter=junit --outputFile=./TestResults/junit.xml
        working-directory: ArbiScannerAdminPannel/ArbiScannerAdminPanel.Client

      - name: Restore
        working-directory: ArbiScannerAdminPannel
        run: dotnet restore ArbiScannerAdminPanel.sln

      - name: Build (with analyzers)
        working-directory: ArbiScannerAdminPannel
        run: dotnet build ArbiScannerAdminPanel.sln --no-restore --configuration Release

      - name: Unit tests
        working-directory: ArbiScannerAdminPannel
        run: >
          dotnet test ArbiScannerAdminPanel.Tests/ArbiScannerAdminPanel.Tests.csproj
          --no-restore --configuration Release
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory ./TestResults

      - name: End SonarCloud analysis
        working-directory: ArbiScannerAdminPannel
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Results
          working-directory: ArbiScannerAdminPannel
          path: "TestResults/*.trx"
          reporter: dotnet-trx

      - name: Publish client test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Client Test Results
          working-directory: ArbiScannerAdminPannel
          path: "ArbiScannerAdminPanel.Client/TestResults/junit.xml"
          reporter: java-junit
