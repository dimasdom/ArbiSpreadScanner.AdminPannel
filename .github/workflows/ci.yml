name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout sibling ArbiScannerWebApp (cross-submodule project reference)
        uses: actions/checkout@v4
        with:
          repository: dimasdom/ArbiSpreadScanner.WebApp
          path: ../ArbiScannerWebApp

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ArbiScannerAdminPanel.Client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: ArbiScannerAdminPanel.Client

      - name: Restore
        run: dotnet restore ArbiScannerAdminPanel.sln

      - name: Build (with analyzers)
        run: dotnet build ArbiScannerAdminPanel.sln --no-restore --configuration Release

      - name: Unit tests
        run: >
          dotnet test ArbiScannerAdminPanel.Tests/ArbiScannerAdminPanel.Tests.csproj
          --no-restore --configuration Release
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory ./TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: "TestResults/*.trx"
          reporter: dotnet-trx
